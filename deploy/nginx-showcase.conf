# Z.Design showcase — nginx server block for z.design.ralle1976.cloud
# Static site (HTML + locally-bundled images). No runtime needed.
#
# Install on the IONOS VPS (87.106.9.85):
#   scp deploy/nginx-showcase.conf root@87.106.9.85:/etc/nginx/sites-available/zdesign-showcase.conf
#   ssh root@87.106.9.85 'ln -sf /etc/nginx/sites-available/zdesign-showcase.conf /etc/nginx/sites-enabled/zdesign-showcase.conf && mkdir -p /var/www/zdesign-showcase && nginx -t && systemctl reload nginx'
# Then SSL (Let's Encrypt):
#   ssh root@87.106.9.85 'certbot --nginx -d z.design.ralle1976.cloud --redirect'

server {
    listen 80;
    listen [::]:80;
    server_name z.design.ralle1976.cloud;

    root /var/www/zdesign-showcase;
    index index.html;

    # gzip text assets
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
    }

    # long-cache the bundled design images
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
