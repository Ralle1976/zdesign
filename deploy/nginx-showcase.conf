# Z.Design showcase — HOST nginx reverse-proxy vhost.
# The showcase runs as a docker container (zdesign-showcase, port 127.0.0.1:8081)
# deployed via the Control Tower (git pull + docker compose up). This block only
# routes the subdomain to the container + terminates TLS.
#
# Install on the IONOS VPS (87.106.9.85) — ADDITIVE, does NOT touch Wortdrauf's block:
#   scp deploy/nginx-showcase.conf root@87.106.9.85:/etc/nginx/sites-available/zdesign-showcase.conf
#   ssh root@87.106.9.85 'ln -sf /etc/nginx/sites-available/zdesign-showcase.conf /etc/nginx/sites-enabled/zdesign-showcase.conf && nginx -t && systemctl reload nginx'
# Then SSL:
#   ssh root@87.106.9.85 'certbot --nginx -d z.design.ralle1976.cloud --redirect'

server {
    listen 80;
    listen [::]:80;
    server_name z.design.ralle1976.cloud;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
