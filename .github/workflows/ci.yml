# Z.Design CI — type-check + lint on every push/PR to main.
# The real type gate is `tsc --noEmit` (ignoreBuildErrors:true in next.config
# means `next build` does NOT enforce types — this workflow does).
#
# Lint is currently permissive (eslint may have pre-existing warnings); once the
# codebase is lint-clean, remove the `continue-on-error` to make it blocking.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type-check (tsc --noEmit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Projekt

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Type-check (the real gate — catches what ignoreBuildErrors swallows)
        run: bunx tsc --noEmit

      - name: Lint (permissive until codebase is clean)
        run: bun run lint
        continue-on-error: true
